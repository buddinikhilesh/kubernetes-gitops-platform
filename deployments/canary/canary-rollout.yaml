apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-canary
  namespace: production
  labels:
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: production-app
      version: canary
  template:
    metadata:
      labels:
        app: production-app
        version: canary
    spec:
      containers:
        - name: app
          image: your-app:canary
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
